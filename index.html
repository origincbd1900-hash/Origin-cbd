  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      height: 100%;
      background: #020403;
      font-family: system-ui, -apple-system, sans-serif;
      color: #e8e4dc;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;

    input, select, button { font-family: inherit; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.3); border-radius: 3px; }
    #root { min-height: 100vh; }
    /* Spinner pendant le chargement de Babel */
    #loading {
      position: fixed; inset: 0; background: #020403;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; gap: 16px;

      border-top-color: #c9a84c; border-radius: 50%;
      animation: spin 0.8s linear infinite;

    @keyframes spin { to { transform: rotate(360deg); } }

<body>

  <!-- Écran de chargement affiché pendant que Babel compile -->
  <div id="loading">
    <div class="spin"></div>
    <p>ORIGIN CBD</p>
  </div>

  <div id="root"></div>

  <!-- React 18 — cdnjs (fiable, pas de rate-limit contrairement à unpkg) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"
          crossorigin="anonymous"
          referrerpolicy="no-referrer"></script>

          crossorigin="anonymous"
          referrerpolicy="no-referrer"></script>

  <!-- Babel Standalone — compile le JSX côté client -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"
          crossorigin="anonymous"
          referrerpolicy="no-referrer"></script>

  <script>
    // Supprimer le warning Babel "in-browser transformer"
    const _cw = console.warn.bind(console);
    console.warn = (...args) => {
      if (args[0] && typeof args[0] === 'string' && args[0].includes('Babel')) return;
      _cw(...args);
    };
  </script>

  <script type="text/babel" data-presets="react">
const { useState, useRef, useEffect } = React;

function getPoints(q) {
  const s = String(q).toLowerCase();
  if (s.includes("e-cig") || s.includes("cigarette")) return 10;
  if (s.includes("roll") || s.includes("roulé")) return 1;
  if (s.includes("10g")) return 10;
  if (s.includes("7g")) return 7;
  if (s.includes("5g")) return 5;
  if (s.includes("3,5g") || s.includes("3.5g")) return 3;
  if (s.includes("3g")) return 3;
  if (s.includes("2,5g") || s.includes("2.5g")) return 2;
  if (s.includes("2g")) return 2;
  if (s.includes("1,5g") || s.includes("1.5g")) return 1;
  if (s.includes("1g")) return 1;
  if (s.includes("trim cbd")) return 10;
  if (s.includes("trim cbn")) return 10;
  return 1;
}

const PALIERS = [
  { pts: 20,  reward: "1g offert au choix" },
  { pts: 50,  reward: "3g offerts au choix" },
  { pts: 100, reward: "7g offerts au choix" },
  { pts: 200, reward: "10g offerts au choix" },
  { pts: 350, reward: "14g offerts au choix" },
  { pts: 500, reward: "20g offerts au choix" },
];
const NIVEAUX = [
  { nom:"Bronze", icon:"🥉", min:0,   max:99,      c:"#cd7f32" },
  { nom:"Argent", icon:"🥈", min:100, max:299,      c:"#b0b8c8" },
  { nom:"Or",     icon:"🥇", min:300, max:699,      c:"#c9a84c" },
  { nom:"Clown",  icon:"🤡", min:700, max:Infinity, c:"#a855f7" },
];

const STORE = { users:[], commandes:[], avis:[], codes:[], demandesPro:[] };

const GOLD="#c9a84c";
const CARD="rgba(14,16,14,0.85)";
const BORDER="rgba(201,168,76,0.22)";
const IS={width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.13)",color:"#e8e4dc",borderRadius:10,padding:"13px 15px",fontSize:15,outline:"none"};
const BTN_GOLD={width:"100%",background:`linear-gradient(135deg,#6e4e10,${GOLD})`,color:"#08080a",border:"none",borderRadius:12,padding:"15px",fontSize:15,fontWeight:600,letterSpacing:.4,cursor:"pointer"};
const BTN_GHOST={width:"100%",background:"transparent",color:"#c0c0c0",border:"1px solid rgba(255,255,255,0.12)",borderRadius:12,padding:"14px",fontSize:14,cursor:"pointer"};
const BTN_GREEN={width:"100%",background:"linear-gradient(135deg,#14401a,#28703a)",color:"#e0f5e0",border:"none",borderRadius:12,padding:"14px",fontSize:14,fontWeight:600,cursor:"pointer"};
const BTN_RED={background:"rgba(239,68,68,0.12)",border:"1px solid rgba(239,68,68,0.3)",color:"#f87171",borderRadius:8,padding:"6px 12px",fontSize:12,cursor:"pointer"};

// Palettes par thème : [r_neb, g_neb, b_neb, r_star, g_star, b_star, r_smoke, g_smoke, b_smoke, r_core, g_core, b_core]
const THEMES = {
  green:  { nb:[20,80,28],   st:[180,230,185], sm:[10,160,20],  co:[80,200,90],   bg:"#020403", ref:[10,140,15]  },
  violet: { nb:[50,10,120],  st:[200,170,255], sm:[80,10,200],  co:[140,60,255],  bg:"#020208", ref:[60,10,180]  },
  gold:   { nb:[100,70,5],   st:[255,230,160], sm:[180,120,5],  co:[240,190,50],  bg:"#040300", ref:[160,100,5]  },
  red:    { nb:[120,10,10],  st:[255,180,180], sm:[180,10,10],  co:[230,50,40],   bg:"#040200", ref:[150,10,10]  },
  white:  { nb:[40,50,60],   st:[220,230,255], sm:[60,80,120],  co:[180,200,240], bg:"#020304", ref:[50,70,100]  },
};

function GalaxyBg({ theme="green" }) {
  const ref = useRef(null);
  const themeRef = useRef(theme);
  useEffect(() => { themeRef.current = theme; }, [theme]);

  useEffect(() => {
    const c = ref.current; if (!c) return;
    const ctx = c.getContext("2d");
    const W = c.width = window.innerWidth;
    const H = c.height = window.innerHeight;

    // Étoiles fixes (couleur dépend du thème courant via ref)
    const stars = Array.from({ length: 700 }, () => ({
      x: Math.random() * W, y: Math.random() * H,
      r: Math.random() < 0.04 ? Math.random()*1.6+0.9 : Math.random()*0.55+0.08,
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.007 + 0.002,
      bright: Math.random() < 0.04,
      tinted: Math.random() < 0.3,
    }));

    // Fumée volumétrique — particules qui dérivent
    const smoke = Array.from({ length: 18 }, (_, i) => ({
      x: W * (0.55 + Math.random()*0.5),
      y: H * (0.4 + Math.random()*0.45),
      r: Math.random()*120+80,
      vx: -(Math.random()*0.18+0.06),
      vy: -(Math.random()*0.08+0.02),
      alpha: Math.random()*0.07+0.04,
      phase: Math.random()*Math.PI*2,
    }));

    // Reflet bas — fixe
    let t = 0, id;

    function draw() {
      t += 0.4;
      const P = THEMES[themeRef.current] || THEMES.green;
      const [nr,ng,nb] = P.nb;
      const [sr,sg,sb] = P.st;
      const [smr,smg,smb] = P.sm;
      const [cr,cg,cb] = P.co;
      const [rr,rg,rb] = P.ref;

      // ── Fond
      ctx.fillStyle = P.bg;
      ctx.fillRect(0, 0, W, H);

      // ── Reflet eau en bas (1/4 bas de l'écran)
      const waterY = H * 0.78;
      const waterGrad = ctx.createLinearGradient(0, waterY, 0, H);
      waterGrad.addColorStop(0, `rgba(${rr},${rg},${rb},0)`);
      waterGrad.addColorStop(0.3, `rgba(${rr},${rg},${rb},0.18)`);
      waterGrad.addColorStop(0.7, `rgba(${rr},${rg},${rb},0.32)`);
      waterGrad.addColorStop(1, `rgba(${rr},${rg},${rb},0.12)`);
      ctx.fillStyle = waterGrad;
      ctx.fillRect(0, waterY, W, H - waterY);

      // Ondulations de reflet
      for (let i = 0; i < 12; i++) {
        const wy = waterY + (i / 12) * (H - waterY);
        const wave = Math.sin(t * 0.03 + i * 0.8) * 6;
        const lineAlpha = (0.04 - i * 0.003) * (i % 2 === 0 ? 1 : 0.4);
        if (lineAlpha <= 0) continue;
        ctx.strokeStyle = `rgba(${rr},${rg+20},${rb},${lineAlpha})`;
        ctx.lineWidth = 0.8;
        ctx.beginPath(); ctx.moveTo(0, wy + wave); ctx.lineTo(W, wy - wave); ctx.stroke();
      }

      // ── Voie lactée diagonale principale
      const angle = 38 * Math.PI / 180;
      const cos = Math.cos(angle), sin = Math.sin(angle);
      const px = W * 0.52, py = H * 0.42;
      const len = Math.max(W, H) * 2.4;

      // Couches de luminosité croissante vers le centre
      [
        { off:0,   hw:280, a:0.04  },
        { off:-20, hw:180, a:0.07  },
        { off:15,  hw:130, a:0.06  },
        { off:0,   hw:90,  a:0.10  },
        { off:-8,  hw:55,  a:0.13  },
        { off:4,   hw:30,  a:0.16  },
        { off:0,   hw:14,  a:0.20  }, // cœur brillant
        { off:0,   hw:5,   a:0.14  }, // filament central blanc
      ].forEach(({ off, hw, a }, li) => {
        const ox = sin * off, oy = -cos * off;
        // Pour le cœur, utiliser des teintes plus claires
        const rr2 = li >= 6 ? cr : nr;
        const gg2 = li >= 6 ? cg : ng;
        const bb2 = li >= 6 ? cb : nb;
        const gP = ctx.createLinearGradient(
          px+ox+sin*hw, py+oy-cos*hw,
          px+ox-sin*hw, py+oy+cos*hw
        );
        gP.addColorStop(0,   "rgba(0,0,0,0)");
        gP.addColorStop(0.3, `rgba(${rr2},${gg2},${bb2},${a*0.35})`);
        gP.addColorStop(0.5, `rgba(${rr2},${gg2},${bb2},${a})`);
        gP.addColorStop(0.7, `rgba(${rr2},${gg2},${bb2},${a*0.35})`);
        gP.addColorStop(1,   "rgba(0,0,0,0)");
        ctx.fillStyle = gP; ctx.fillRect(0,0,W,H);
      });

      // ── Amas stellaires le long de la bande
      [
        {tp:0.22,pp:10,  r:45,a:0.16},{tp:0.35,pp:-18,r:32,a:0.14},
        {tp:0.48,pp:6,   r:55,a:0.18},{tp:0.56,pp:-10,r:28,a:0.13},
        {tp:0.65,pp:20,  r:38,a:0.12},{tp:0.76,pp:-4, r:22,a:0.14},
        {tp:0.28,pp:-28, r:20,a:0.10},{tp:0.70,pp:28, r:30,a:0.11},
      ].forEach(({tp,pp,r,a})=>{
        const along = tp - 0.5;
        const cx2 = px + cos*along*len*0.85 + sin*pp;
        const cy2 = py + sin*along*len*0.85 - cos*pp;
        const sc = (W/380);
        const ng2 = ctx.createRadialGradient(cx2,cy2,0,cx2,cy2,r*sc);
        ng2.addColorStop(0,   `rgba(${cr},${cg},${cb},${a})`);
        ng2.addColorStop(0.4, `rgba(${nr},${ng},${nb},${a*0.5})`);
        ng2.addColorStop(1,   "rgba(0,0,0,0)");
        ctx.fillStyle = ng2; ctx.fillRect(0,0,W,H);
      });

      // ── Fumée volumétrique droite (comme l'image)
      smoke.forEach(s => {
        s.x += s.vx; s.y += s.vy;
        if (s.x < -s.r) { s.x = W + s.r; s.y = H*(0.4+Math.random()*0.45); }
        if (s.y < -s.r) { s.y = H + s.r; }
        const pulse = 0.7 + 0.3*Math.sin(t*0.015 + s.phase);
        const sg2 = ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*pulse);
        sg2.addColorStop(0,   `rgba(${smr},${smg},${smb},${s.alpha})`);
        sg2.addColorStop(0.5, `rgba(${smr},${smg},${smb},${s.alpha*0.4})`);
        sg2.addColorStop(1,   "rgba(0,0,0,0)");
        ctx.fillStyle = sg2; ctx.fillRect(0,0,W,H);
      });

      // Nuage de fumée bas-gauche (second amas comme dans la photo)
      const sg3 = ctx.createRadialGradient(W*0.08,H*0.88,0,W*0.08,H*0.88,W*0.22);
      sg3.addColorStop(0,   `rgba(${smr},${smg},${smb},0.10)`);
      sg3.addColorStop(0.5, `rgba(${smr},${smg},${smb},0.04)`);
      sg3.addColorStop(1,   "rgba(0,0,0,0)");
      ctx.fillStyle = sg3; ctx.fillRect(0,0,W,H);

      // ── Étoiles
      stars.forEach(s => {
        const al = (Math.sin(s.phase + t*s.speed)+1)/2;
        const alpha = s.bright ? 0.5+al*0.5 : 0.12+al*0.7;
        const er = s.tinted ? sr : 210;
        const eg = s.tinted ? sg : 225;
        const eb = s.tinted ? sb : 245;

        if (s.bright) {
          const hg = ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*5);
          hg.addColorStop(0, `rgba(${er},${eg},${eb},${al*0.4})`);
          hg.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = hg;
          ctx.beginPath(); ctx.arc(s.x,s.y,s.r*5,0,Math.PI*2); ctx.fill();
          const rl = s.r*7;
          ctx.strokeStyle = `rgba(${er},${eg},${eb},${al*0.22})`;
          ctx.lineWidth = 0.4;
          ctx.beginPath(); ctx.moveTo(s.x-rl,s.y); ctx.lineTo(s.x+rl,s.y); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(s.x,s.y-rl); ctx.lineTo(s.x,s.y+rl); ctx.stroke();
        }
        ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fillStyle = `rgba(${er},${eg},${eb},${alpha})`; ctx.fill();
      });

      id = requestAnimationFrame(draw);
    }

    draw();
    return () => cancelAnimationFrame(id);
  }, []);

  return <canvas ref={ref} style={{position:"fixed",inset:0,zIndex:0,width:"100vw",height:"100vh",pointerEvents:"none"}}/>;
}

function Card({children,style}){return <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:16,padding:"18px 16px",backdropFilter:"blur(10px)",...style}}>{children}</div>;}

function Header({title,onBack,right}){return(
  <div style={{position:"sticky",top:0,zIndex:40,background:"rgba(6,7,10,0.94)",borderBottom:"1px solid rgba(201,168,76,0.13)",backdropFilter:"blur(14px)",padding:"14px 16px",display:"flex",alignItems:"center",gap:12}}>
    {onBack&&<button onClick={onBack} style={{background:"none",border:"none",color:GOLD,fontSize:24,padding:0,lineHeight:1,cursor:"pointer"}}>‹</button>}
    <h2 style={{flex:1,fontFamily:"Georgia,serif",fontSize:22,color:"#e8e4dc",fontWeight:600}}>{title}</h2>
    {right}
  </div>
);}

// ─── AGE GATE
function AgeGate({onAccept}){
  const [checked,setChecked]=useState(false); const [err,setErr]=useState(false);
  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{width:"100%",maxWidth:400,textAlign:"center"}}>
        <div style={{fontSize:54,marginBottom:16}}>🔞</div>
        <h1 style={{fontFamily:"Georgia,serif",fontSize:40,color:GOLD,fontWeight:600,letterSpacing:2,marginBottom:6}}>Origin CBD</h1>
        <p style={{color:"#a0a0a0",fontSize:12,letterSpacing:3,marginBottom:30}}>— L'origine du bien-être —</p>
        <Card>
          <h2 style={{fontSize:20,fontWeight:600,color:"#e8e4dc",marginBottom:10}}>Vérification d'âge</h2>
          <p style={{color:"#c0c0c0",fontSize:14,lineHeight:1.7,marginBottom:20}}>Ce site est réservé aux personnes <span style={{color:GOLD,fontWeight:600}}>majeures (+18 ans).</span></p>
          <label style={{display:"flex",alignItems:"flex-start",gap:12,background:"rgba(255,255,255,0.04)",border:`1px solid ${err?"rgba(239,68,68,0.5)":BORDER}`,borderRadius:10,padding:"14px 16px",cursor:"pointer",textAlign:"left",marginBottom:16}}>
            <div onClick={()=>{setChecked(!checked);setErr(false);}} style={{width:20,height:20,border:`2px solid ${checked?GOLD:"rgba(255,255,255,0.25)"}`,borderRadius:5,background:checked?GOLD:"transparent",flexShrink:0,marginTop:1,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
              {checked&&<span style={{color:"#08080a",fontSize:13,fontWeight:700}}>✓</span>}
            </div>
            <span style={{color:"#d8d8d8",fontSize:14,lineHeight:1.5}}>J'ai 18 ans ou plus et j'accepte les conditions d'utilisation</span>
          </label>
          {err&&<p style={{color:"#f87171",fontSize:13,marginBottom:10}}>Veuillez cocher la case.</p>}
          <button onClick={()=>{if(!checked){setErr(true);return;}onAccept();}} style={BTN_GOLD}>Entrer sur le site →</button>
          <p style={{color:"#909090",fontSize:11,marginTop:14,lineHeight:1.6}}>⚠️ La vente de CBD est interdite aux mineurs. THC &lt; 0,3%</p>
        </Card>
      </div>
    </div>
  );
}

// ─── WELCOME
function Welcome({onUser,onGuest,onManager,store}){
  const saved = (() => { try { return JSON.parse(localStorage.getItem("origincbd_user")||"{}"); } catch(e){return {};} })();
  const [prenom,setPrenom]=useState(saved.prenom||"");
  const [email,setEmail]=useState(saved.email||"");
  const [mgCode,setMgCode]=useState(""); const [showMg,setShowMg]=useState(false);
  const [err,setErr]=useState(""); const [mgErr,setMgErr]=useState("");
  function go(){
    if(!prenom.trim()||!email.trim()){setErr("Veuillez remplir tous les champs.");return;}
    if(!email.includes("@")){setErr("Email invalide.");return;}
    let u=store.users.find(x=>x.email===email);
    if(!u){u={prenom:prenom.trim(),email,points:0,historique:[]};store.users.push(u);}
    try { localStorage.setItem("origincbd_user", JSON.stringify({prenom:prenom.trim(),email})); } catch(e){}
    onUser(u);
  }
  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px 20px"}}>
      <div style={{textAlign:"center",marginBottom:32}}>
        <h1 style={{fontFamily:"Georgia,serif",fontSize:44,color:GOLD,fontWeight:600,letterSpacing:2,marginBottom:4}}>Origin CBD</h1>
        <p style={{color:"#a0a0a0",fontSize:12,letterSpacing:3}}>— L'origine du bien-être —</p>
      </div>
      <Card style={{width:"100%",maxWidth:400}}>
        <h2 style={{fontSize:18,fontWeight:600,color:"#e8e4dc",marginBottom:20,textAlign:"center"}}>Bienvenue</h2>
        <input placeholder="Votre prénom" value={prenom} onChange={e=>{setPrenom(e.target.value);setErr("");}} style={{...IS,marginBottom:12}}/>
        <input placeholder="Votre adresse email" type="email" value={email} onChange={e=>{setEmail(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&go()} style={{...IS,marginBottom:err?8:16}}/>
        {err&&<p style={{color:"#f87171",fontSize:13,marginBottom:12}}>{err}</p>}
        <button onClick={go} style={BTN_GOLD}>Accéder au catalogue</button>
        <div style={{textAlign:"center",margin:"14px 0",color:"#8a8a8a",fontSize:13}}>— ou —</div>
        <button onClick={onGuest} style={BTN_GHOST}>Parcourir sans compte</button>
        <div style={{borderTop:"1px solid rgba(255,255,255,0.07)",marginTop:20,paddingTop:16}}>
          <button onClick={()=>setShowMg(!showMg)} style={{background:"none",border:"none",color:"#909090",fontSize:11,letterSpacing:1,cursor:"pointer"}}>🔐 Accès gérant</button>
          {showMg&&<>
            <input placeholder="Code gérant" type="password" value={mgCode} onChange={e=>{setMgCode(e.target.value);setMgErr("");}} onKeyDown={e=>e.key==="Enter"&&(mgCode==="35353010"?onManager():setMgErr("Code incorrect"))} style={{...IS,marginTop:10,marginBottom:mgErr?6:10,textAlign:"center",letterSpacing:6,fontSize:20}}/>
            {mgErr&&<p style={{color:"#f87171",fontSize:13,marginBottom:8}}>{mgErr}</p>}
            <button onClick={()=>mgCode==="35353010"?onManager():setMgErr("Code incorrect")} style={BTN_GOLD}>Valider</button>
          </>}
        </div>
      </Card>
    </div>
  );
}

// ─── BOTTOM NAV
function BottomNav({tab,setTab,onQuit}){
  const items=[
    {id:"particulier",icon:"🛍️",label:"Particuliers"},
    {id:"pro",icon:"💼",label:"Pro"},
    {id:"fidelite",icon:"🏆",label:"Fidélité"},
    {id:"scanner",icon:"📱",label:"Scanner"},
  ];
  return(

function CommandeForm({cart, total, user, onDone, store, forceUpdate}){

  const [tel,setTel]=useState("");
  const [note,setNote]=useState("");
  const [err,setErr]=useState("");

  function submit(){
    if(!prenom.trim()||!tel.trim()){setErr("Prénom et téléphone obligatoires.");return;}
    const lignes = cart.map(it=>`${it.label} — ${it.format.q} ×${it.qte} = ${it.format.p*it.qte}€`).join(" | ");
    store.commandes.push({
      prenom:prenom.trim(), tel, note,
      total:total+"€", detail:lignes,
      date:new Date().toLocaleDateString("fr-FR"),
      statut:"nouvelle",

    if(forceUpdate) forceUpdate();
    setOk(true); setErr("");
  }

  if(ok) return(
    <div style={{marginTop:14,background:"rgba(74,180,80,0.1)",border:"1px solid rgba(74,180,80,0.3)",borderRadius:12,padding:"18px",textAlign:"center"}}>

      <button onClick={()=>{setOk(false);setOpen(false);onDone();}} style={{...BTN_GREEN,marginTop:14,fontSize:13}}>Fermer</button>

  );

  if(!open) return(
    <button onClick={()=>setOpen(true)} style={{...BTN_GOLD,marginTop:14}}>

  return(
    <div style={{marginTop:14,borderTop:`1px solid ${BORDER}`,paddingTop:14}}>

  return(
    <Card style={{margin:"14px 0"}}>
      {ok?(

          <div style={{fontSize:46,marginBottom:12}}>✅</div>

        </div>
      ):(
        <>
          <p style={{color:GOLD,fontWeight:600,fontSize:15,marginBottom:4}}>🤝 Demande de partenariat</p>
          <p style={{color:"#aaaaaa",fontSize:13,marginBottom:16,lineHeight:1.6}}>Remplissez ce formulaire pour rejoindre le réseau Origin CBD.</p>
          {[{label:"PRÉNOM / NOM *",key:"prenom",placeholder:"Votre prénom et nom"},{label:"NUMÉRO SIRET *",key:"siret",placeholder:"Ex : 12345678900012"},{label:"N° TVA INTRACOMMUNAUTAIRE",key:"tva",placeholder:"Ex : FR12345678900"},{label:"EMAIL PROFESSIONNEL *",key:"email",placeholder:"votre@email.com",type:"email"}].map(field=>(
            <div key={field.key}>
              <p style={{color:"#b8b8b8",fontSize:11,letterSpacing:1,marginBottom:5}}>{field.label}</p>
              <input placeholder={field.placeholder} type={field.type||"text"} value={f[field.key]} onChange={e=>setF({...f,[field.key]:e.target.value})} style={{...IS,marginBottom:12}}/>

          <select value={f.formule} onChange={e=>setF({...f,formule:e.target.value})} style={{...IS,marginBottom:16,background:"rgba(20,22,20,0.9)"}}>

  );

// ─── FIDÉLITÉ
function Fidelite({user}){
  const pts = user?.points || 0;
  const niv = NIVEAUX.find(n=>pts>=n.min&&pts<=n.max) || NIVEAUX[0];
  const next = NIVEAUX.find(n=>n.min>pts);
  const progPct = next ? Math.min(100,((pts-niv.min)/(next.min-niv.min))*100) : 100;
  const nextPalier = PALIERS.find(p=>pts<p.pts);
  const lastPalier = [...PALIERS].reverse().find(p=>pts>=p.pts);
  const ptsToNext = nextPalier ? nextPalier.pts - pts : 0;

  // Couleurs spéciales par niveau
  const nivGrad = {
    "Bronze":  "linear-gradient(135deg,#2a1600,#1a0e00,#3a2008,#1a0e00)",
    "Argent":  "linear-gradient(135deg,#141820,#0c1018,#1e2530,#0c1018)",
    "Or":      "linear-gradient(135deg,#1e1400,#120d00,#2a1e08,#120d00)",
    "Clown":   "linear-gradient(135deg,#180828,#0e0418,#240c3a,#0e0418)",

  const shineGrad = {
    "Bronze": "linear-gradient(120deg,transparent 30%,rgba(200,120,40,0.15) 50%,transparent 70%)",
    "Argent": "linear-gradient(120deg,transparent 30%,rgba(180,200,230,0.18) 50%,transparent 70%)",
    "Or":     "linear-gradient(120deg,transparent 30%,rgba(220,180,60,0.2) 50%,transparent 70%)",
    "Clown":  "linear-gradient(120deg,transparent 30%,rgba(180,80,255,0.2) 50%,transparent 70%)",

  const BAREME = [
    {icon:"🌿",label:"1g acheté",pts:"1 pt"},
    {icon:"🌿",label:"2g / 2,5g",pts:"2 pts"},
    {icon:"🌿",label:"3g / 3,5g",pts:"3 pts"},
    {icon:"🌿",label:"5g",pts:"5 pts"},
    {icon:"🌿",label:"7g",pts:"7 pts"},
    {icon:"🌿",label:"10g",pts:"10 pts"},
    {icon:"🚬",label:"1 pré-roulé",pts:"1 pt"},
    {icon:"🔌",label:"1 e-cigarette",pts:"10 pts"},
  ];

  return(
    <div style={{paddingBottom:90,overflowX:"hidden"}}>
      <Header title="Fidélité"/>

      {/* ── CARTE DE FIDÉLITÉ PREMIUM */}
      <div style={{padding:"16px 14px 0"}}>
        <div style={{
          position:"relative", borderRadius:22, overflow:"hidden",
          background: nivGrad[niv.nom],
          border:`1.5px solid ${niv.c}60`,
          boxShadow:`0 0 32px ${niv.c}30, 0 8px 32px rgba(0,0,0,0.6)`,
          padding:"22px 20px 20px",
          marginBottom:16,
        }}>
          {/* Reflet brillant diagonal */}
          <div style={{position:"absolute",inset:0,background:shineGrad[niv.nom],pointerEvents:"none"}}/>
          {/* Cercles décoratifs en arrière-plan */}
          <div style={{position:"absolute",top:-40,right:-40,width:140,height:140,borderRadius:"50%",background:`${niv.c}08`,border:`1px solid ${niv.c}15`,pointerEvents:"none"}}/>
          <div style={{position:"absolute",bottom:-30,left:-30,width:100,height:100,borderRadius:"50%",background:`${niv.c}06`,border:`1px solid ${niv.c}10`,pointerEvents:"none"}}/>

          {/* Header carte */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18,position:"relative"}}>
            <div>
              <p style={{color:niv.c,fontSize:9,fontWeight:700,letterSpacing:3,marginBottom:4}}>ORIGIN CBD · PROGRAMME FIDÉLITÉ</p>
              <p style={{color:"#e8e4dc",fontSize:17,fontWeight:700,fontFamily:"Georgia,serif"}}>{user?.prenom||"Visiteur"}</p>
            </div>
            {/* Badge niveau */}
            <div style={{
              background:`${niv.c}20`,
              border:`1.5px solid ${niv.c}`,

          <div style={{display:"flex",alignItems:"flex-end",gap:8,marginBottom:16}}>
            <span style={{
              color:niv.c, fontSize:64, fontWeight:800, lineHeight:1,
              textShadow:`0 0 20px ${niv.c}80`,
              fontFamily:"Georgia,serif",

            <div style={{paddingBottom:8}}>
              <p style={{color:niv.c,fontSize:11,fontWeight:600,opacity:0.8}}>POINTS</p>

        {/* ── RÉCOMPENSE DÉBLOQUÉE */}
        {lastPalier && (
          <div style={{
            background:"linear-gradient(135deg,rgba(40,160,60,0.15),rgba(20,100,35,0.1))",
            border:"1px solid rgba(80,200,90,0.4)",
            borderRadius:14,padding:"14px 16px",marginBottom:16,
            display:"flex",alignItems:"center",gap:12,
            boxShadow:"0 0 20px rgba(60,180,70,0.15)",

              </div>
            </div>

        <p style={{color:"#a0a0a0",fontSize:10,fontWeight:700,letterSpacing:2,marginBottom:10}}>VOS NIVEAUX</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:18}}>

            const active = pts >= n.min;
            return(
              <div key={n.nom} style={{
                position:"relative",overflow:"hidden",
                background: active ? `linear-gradient(135deg,${n.c}18,${n.c}08)` : "rgba(255,255,255,0.02)",
                border:`1.5px solid ${active ? n.c+"70" : "rgba(255,255,255,0.06)"}`,
                borderRadius:14, padding:"14px 12px",
                opacity: active ? 1 : 0.4,
                boxShadow: active ? `0 0 16px ${n.c}20` : "none",
                transition:"all 0.3s",
              }}>
                {active && <div style={{position:"absolute",top:-15,right:-15,width:50,height:50,borderRadius:"50%",background:`${n.c}12`,pointerEvents:"none"}}/>}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                  <span style={{fontSize:26}}>{n.icon}</span>

                <p style={{color:"#8a8a8a",fontSize:10}}>
                  {n.min===0?"Dès l'inscription":`dès ${n.min} pts`}
                </p>
              </div>
            );
          })}
        </div>

        {/* ── PALIERS — timeline verticale */}
        <p style={{color:"#a0a0a0",fontSize:10,fontWeight:700,letterSpacing:2,marginBottom:12}}>PALIERS DE RÉCOMPENSES</p>
        <div style={{position:"relative",paddingLeft:20,marginBottom:18}}>
          {/* Ligne verticale */}
          <div style={{position:"absolute",left:6,top:8,bottom:8,width:2,background:"rgba(255,255,255,0.06)",borderRadius:2}}/>
          {PALIERS.map((p,i)=>{
            const done = pts >= p.pts;
            const current = nextPalier && nextPalier.pts === p.pts;
            const pct = done ? 100 : Math.min(100,Math.round((pts/p.pts)*100));
            return(
              <div key={p.pts} style={{display:"flex",gap:12,marginBottom:i<PALIERS.length-1?10:0,position:"relative"}}>

                  position:"absolute", left:-20, top:10,

                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:done||current?6:0}}>

                        background: done ? `${GOLD}22` : "rgba(255,255,255,0.04)",

                    </div>
                    {done && <span style={{fontSize:16}}>🎁</span>}
                  </div>
                  {/* Mini barre de progression si pas encore atteint */}
                  {!done && (
                    <div>
                      <div style={{height:3,background:"rgba(255,255,255,0.05)",borderRadius:10,overflow:"hidden",marginTop:6}}>

                      {pts>0&&<p style={{color:"#8a8a8a",fontSize:9,marginTop:3}}>{pct}% atteint</p>}

        {/* ── BARÈME DE POINTS */}
        <p style={{color:"#a0a0a0",fontSize:10,fontWeight:700,letterSpacing:2,marginBottom:10}}>BARÈME DE POINTS</p>

        {/* ── CTA Scanner */}
        <div style={{
          background:"linear-gradient(135deg,rgba(180,140,20,0.2),rgba(140,100,10,0.15))",

// ─── SCANNER
const GRAM_SCAN=[
  {q:"1g",pts:1},{q:"1,5g",pts:1},{q:"2g",pts:2},{q:"2,5g",pts:2},
  {q:"3g",pts:3},{q:"3,5g",pts:3},{q:"5g",pts:5},{q:"7g",pts:7},
  {q:"10g",pts:10},{q:"Pré-roulé",pts:1},{q:"E-cigarette",pts:10},
];

function ScannerPage({user,onScan}){
  const [val,setVal]=useState("");
  const [gram,setGram]=useState("10g");
  const [msg,setMsg]=useState("");
  const [success,setSuccess]=useState(false);

  function go(){
    if(val.length!==5){setMsg("❌ Le code doit contenir 5 chiffres.");return;}
    const r=onScan(val,gram);
    setMsg(r);
    setSuccess(r.startsWith("✅"));
    setVal("");
    setTimeout(()=>{setMsg("");setSuccess(false);},4000);
  }

  const gramInfo = GRAM_SCAN.find(g=>g.q===gram)||{pts:1};

  return(
    <div style={{paddingBottom:80}}>
      <Header title="Scanner"/>
      <div style={{padding:"28px 20px 0",display:"flex",flexDirection:"column",alignItems:"center"}}>
        <div style={{fontSize:64,marginBottom:14}}>📱</div>
        <h2 style={{fontFamily:"Georgia,serif",color:GOLD,fontSize:26,marginBottom:6,textAlign:"center"}}>Scanner mon code</h2>
        <p style={{color:"#aaaaaa",fontSize:13,lineHeight:1.7,marginBottom:24,maxWidth:300,textAlign:"center"}}>
          Entrez le code à 5 chiffres de votre pochon pour gagner vos <span style={{color:GOLD,fontWeight:600}}>points fidélité</span>.
        </p>

        <div style={{width:"100%",maxWidth:340}}>

          {/* Sélection grammage */}
          <div style={{background:"rgba(8,12,8,0.9)",border:`1px solid ${BORDER}`,borderRadius:14,padding:"14px",marginBottom:16}}>
            <p style={{color:"#b8b8b8",fontSize:11,fontWeight:700,letterSpacing:1,marginBottom:10,textAlign:"center"}}>GRAMMAGE DU POCHON</p>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
              {GRAM_SCAN.filter(g=>!g.q.includes("roulé")&&!g.q.includes("iga")).map(g=>(
                <button key={g.q} onClick={()=>setGram(g.q)} style={{
                  background: gram===g.q ? `${GOLD}22` : "rgba(255,255,255,0.04)",
                  border: `1.5px solid ${gram===g.q ? GOLD : "rgba(255,255,255,0.08)"}`,
                  borderRadius:9, padding:"8px 4px", cursor:"pointer",
                  boxShadow: gram===g.q ? `0 0 10px ${GOLD}40` : "none",
                }}>
                  <p style={{color:gram===g.q?GOLD:"#d8d8d8",fontSize:13,fontWeight:700}}>{g.q}</p>
                  <p style={{color:gram===g.q?"#5aba60":"#707070",fontSize:10,marginTop:2}}>+{g.pts} pt{g.pts>1?"s":""}</p>
                </button>
              ))}
            </div>
            {/* Pré-roulé et E-cig */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:6}}>
              {GRAM_SCAN.filter(g=>g.q.includes("roulé")||g.q.includes("iga")).map(g=>(
                <button key={g.q} onClick={()=>setGram(g.q)} style={{
                  background: gram===g.q ? `${GOLD}22` : "rgba(255,255,255,0.04)",
                  border: `1.5px solid ${gram===g.q ? GOLD : "rgba(255,255,255,0.08)"}`,
                  borderRadius:9, padding:"8px 6px", cursor:"pointer",
                  boxShadow: gram===g.q ? `0 0 10px ${GOLD}40` : "none",
                }}>
                  <p style={{color:gram===g.q?GOLD:"#d8d8d8",fontSize:12,fontWeight:700}}>{g.q}</p>
                  <p style={{color:gram===g.q?"#5aba60":"#707070",fontSize:10,marginTop:2}}>+{g.pts} pt{g.pts>1?"s":""}</p>
                </button>
              ))}
            </div>
          </div>

          {/* Récap sélection */}
          <div style={{background:`${GOLD}10`,border:`1px solid ${GOLD}30`,borderRadius:10,padding:"10px 14px",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{color:"#b8b8b8",fontSize:13}}>Pochon sélectionné</span>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <span style={{color:GOLD,fontWeight:700,fontSize:15}}>{gram}</span>
              <span style={{background:"rgba(74,180,80,0.15)",border:"1px solid rgba(74,180,80,0.3)",borderRadius:20,padding:"2px 9px",color:"#5aba60",fontSize:12,fontWeight:700}}>+{gramInfo.pts} pt{gramInfo.pts>1?"s":""}</span>
            </div>
          </div>

          {/* Saisie code */}
          <p style={{color:"#b8b8b8",fontSize:11,fontWeight:700,letterSpacing:1,marginBottom:8,textAlign:"center"}}>CODE DU POCHON</p>
          <input
            placeholder="_ _ _ _ _"
            value={val}
            onChange={e=>setVal(e.target.value.replace(/\D/g,"").slice(0,5))}
            onKeyDown={e=>e.key==="Enter"&&go()}
            style={{...IS,textAlign:"center",letterSpacing:14,fontSize:32,fontWeight:700,marginBottom:14,
              borderColor: val.length===5 ? `${GOLD}80` : "rgba(255,255,255,0.13)"}}
            maxLength={5}
            inputMode="numeric"
          />

          {/* Message résultat */}
          {msg&&(
            <div style={{
              background: success ? "rgba(74,180,80,0.12)" : "rgba(239,68,68,0.1)",
              border: `1px solid ${success?"rgba(74,180,80,0.35)":"rgba(239,68,68,0.3)"}`,
              borderRadius:12, padding:"12px 16px", marginBottom:14, textAlign:"center",
            }}>
              <p style={{color:success?"#5aba60":"#f87171",fontSize:14,fontWeight:600}}>{msg}</p>
            </div>
          )}

          <button onClick={go} style={{...BTN_GOLD,opacity:val.length===5?1:0.5}}>
            Valider le code →
          </button>

          {/* Infos utilisateur */}
          {user && (
            <div style={{marginTop:20,background:"rgba(8,12,8,0.8)",border:`1px solid ${BORDER}`,borderRadius:12,padding:"12px 16px",textAlign:"center"}}>
              <p style={{color:GOLD,fontWeight:700,fontSize:16}}>{user.points||0} pts</p>
              <p style={{color:"#aaaaaa",fontSize:12,marginTop:2}}>{user.prenom} · Programme fidélité</p>
            </div>
          )}
          {!user&&<p style={{color:"#909090",fontSize:12,marginTop:16,textAlign:"center"}}>Connectez-vous pour cumuler des points</p>}
        </div>
      </div>
    </div>
  );
}

function StatsVentes({store}){
  // Parser les commandes pour extraire les ventes par gamme/grammage
  const ventes = {};
  store.commandes.forEach(cmd=>{
    if(!cmd.detail) return;
    cmd.detail.split(" | ").forEach(ligne=>{
      // Format: "Gamme — Type — format.q ×qte = total€"
      const m = ligne.match(/^(.+?) — (.+?) — (.+?) ×(\d+)/);
      if(!m) return;
      const [,gamme,type,grammage,qteStr] = m;
      const qte = parseInt(qteStr)||1;
      const key = `${gamme}||${grammage}`;
      if(!ventes[key]) ventes[key]={gamme,grammage,qte:0,type};
      ventes[key].qte += qte;
    });
  });

  const liste = Object.values(ventes).sort((a,b)=>b.qte-a.qte);
  const total = liste.reduce((s,v)=>s+v.qte,0);
  const max = liste[0]?.qte||1;

  // Stats par gamme
  const parGamme = {};
  liste.forEach(v=>{
    const g = v.gamme.split("·")[0].trim().split("—")[0].trim();
    if(!parGamme[g]) parGamme[g]=0;
    parGamme[g]+=v.qte;
  });
  const gammes = Object.entries(parGamme).sort((a,b)=>b[1]-a[1]);

  function exportStats(){
    const date = new Date().toLocaleDateString("fr-FR");
    let txt = `ORIGIN CBD — Statistiques ventes\nExportées le ${date}\n${"=".repeat(40)}\n\n`;
    txt += `TOTAL ARTICLES VENDUS : ${total}\n\n`;
    txt += `PAR GAMME :\n`;
    gammes.forEach(([g,n])=>{ txt += `  ${g} : ${n} vente(s)\n`; });
    txt += `\nDÉTAIL PAR PRODUIT (du plus vendu) :\n`;
    liste.forEach((v,i)=>{ txt += `  ${i+1}. ${v.gamme} ${v.grammage} : ${v.qte} vente(s)\n`; });
    const blob = new Blob([txt],{type:"text/plain;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href=url; a.download=`stats_ventes_${date.replace(/\//g,"-")}.txt`;
    a.click(); URL.revokeObjectURL(url);
  }

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <p style={{color:GOLD,fontSize:12,letterSpacing:1}}>STATISTIQUES VENTES</p>
        {liste.length>0&&(
          <button onClick={exportStats} style={{background:`${GOLD}20`,border:`1px solid ${GOLD}60`,color:GOLD,borderRadius:10,padding:"7px 13px",fontSize:12,fontWeight:700,cursor:"pointer"}}>
            ⬇️ Exporter
          </button>
        )}
      </div>

      {liste.length===0?(
        <div style={{textAlign:"center",padding:"40px 0"}}>
          <p style={{fontSize:36,marginBottom:10}}>📊</p>
          <p style={{color:"#909090",fontSize:13}}>Aucune vente enregistrée</p>
          <p style={{color:"#555",fontSize:11,marginTop:6}}>Les stats se remplissent quand des clients passent commande</p>
        </div>
      ):(
        <>
          {/* Total */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
            <div style={{background:"rgba(201,168,76,0.08)",border:`1px solid ${BORDER}`,borderRadius:12,padding:"14px",textAlign:"center"}}>
              <p style={{color:GOLD,fontSize:28,fontWeight:800}}>{total}</p>
              <p style={{color:"#909090",fontSize:11,marginTop:2,letterSpacing:.5}}>ARTICLES VENDUS</p>
            </div>
            <div style={{background:"rgba(74,180,80,0.08)",border:"1px solid rgba(74,180,80,0.2)",borderRadius:12,padding:"14px",textAlign:"center"}}>
              <p style={{color:"#5aba60",fontSize:28,fontWeight:800}}>{liste.length}</p>
              <p style={{color:"#909090",fontSize:11,marginTop:2,letterSpacing:.5}}>RÉFÉRENCES</p>
            </div>
          </div>

          {/* Top ventes */}
          {liste[0]&&(
            <div style={{background:"linear-gradient(135deg,rgba(251,191,36,0.15),rgba(201,168,76,0.08))",border:`1px solid ${GOLD}50`,borderRadius:12,padding:"14px",marginBottom:14,display:"flex",gap:12,alignItems:"center"}}>
              <span style={{fontSize:30}}>🏆</span>
              <div>
                <p style={{color:"#fbbf24",fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:2}}>MEILLEURE VENTE</p>
                <p style={{color:"#e8e4dc",fontWeight:700,fontSize:15}}>{liste[0].gamme}</p>
                <p style={{color:GOLD,fontSize:13}}>{liste[0].grammage} · <span style={{fontWeight:700}}>{liste[0].qte} vente{liste[0].qte>1?"s":""}</span></p>
              </div>
            </div>
          )}

          {/* Par gamme */}
          <p style={{color:"#707070",fontSize:10,fontWeight:700,letterSpacing:1.5,marginBottom:8}}>PAR GAMME</p>
          <div style={{marginBottom:16}}>
            {gammes.map(([g,n],i)=>(
              <div key={g} style={{marginBottom:6}}>

                  <div style={{height:"100%",width:`${Math.round((n/gammes[0][1])*100)}%`,background:i===0?`linear-gradient(90deg,${GOLD}80,${GOLD})`:"rgba(255,255,255,0.2)",borderRadius:10}}/>
                </div>
              </div>
            ))}
          </div>

          {/* Détail par produit */}
          <p style={{color:"#707070",fontSize:10,fontWeight:700,letterSpacing:1.5,marginBottom:8}}>DÉTAIL PAR GRAMMAGE</p>
          <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:12,overflow:"hidden"}}>
            <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1.2fr",padding:"7px 12px",background:"rgba(201,168,76,0.06)",borderBottom:`1px solid ${BORDER}`}}>
              {[["Produit","#909090"],["Qtés","#909090"],["Part",GOLD]].map(([h,col])=>(
                <p key={h} style={{color:col,fontSize:10,fontWeight:700}}>{h}</p>
              ))}
            </div>
            {liste.map((v,i)=>(
              <div key={i} style={{display:"grid",gridTemplateColumns:"2fr 1fr 1.2fr",padding:"9px 12px",borderBottom:i<liste.length-1?"1px solid rgba(255,255,255,0.04)":"none",alignItems:"center",background:i%2===0?"transparent":"rgba(255,255,255,0.015)"}}>
                <div>
                  <p style={{color:"#d8d8d8",fontSize:12,fontWeight:i<3?600:400}}>{i===0?"🥇 ":i===1?"🥈 ":i===2?"🥉 ":""}{v.grammage}</p>
                  <p style={{color:"#606060",fontSize:10,marginTop:1}}>{v.gamme.split("·")[0].trim()}</p>
                </div>
                <p style={{color:i<3?GOLD:"#c0c0c0",fontWeight:700,fontSize:13}}>{v.qte}</p>
                <div style={{height:4,background:"rgba(255,255,255,0.06)",borderRadius:10,overflow:"hidden",width:"80%"}}>
                  <div style={{height:"100%",width:`${Math.round((v.qte/max)*100)}%`,background:i===0?GOLD:"rgba(201,168,76,0.4)",borderRadius:10}}/>
                </div>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

    {q:"7g",    pts:7,  label:"7g — 7 pts"},
    {q:"10g",   pts:10, label:"10g — 10 pts"},
    {q:"pré-roulé", pts:1, label:"Pré-roulé — 1 pt"},
    {q:"e-cigarette", pts:10, label:"E-cigarette — 10 pts"},
  ];

  function genCodes(){
    const g = GRAMMAGES.find(x=>x.q===grammage) || GRAMMAGES[0];
    Array.from({length:qteGen},()=>store.codes.push({
      code: Math.floor(10000+Math.random()*90000).toString(),
      used: false,
      grammage: g.q,
      pts: g.pts,
    }));
    fu();
  }

  const TABS=[{id:"demandes",l:"📨 Demandes"},{id:"adherents",l:"👥 Adhérents"},{id:"commandes",l:"📦 Commandes"},{id:"avis",l:"⭐ Avis"},{id:"codes",l:"🏷️ Codes"},{id:"stats",l:"📊 Stats"}];
  const badge=store.demandesPro.filter(d=>d.statut==="attente").length;
  const unusedCodes=store.codes.filter(c=>!c.used);
  const usedCodes=store.codes.filter(c=>c.used);

  // Grouper les codes disponibles par grammage pour l'affichage
  const codesByGram = {};
  store.codes.forEach((c,i)=>{
    const key = c.grammage || "1g";
    if(!codesByGram[key]) codesByGram[key]={grammage:key, pts:c.pts||1, codes:[]};
    codesByGram[key].codes.push({...c, idx:i});
  });

  return(
    <div style={{minHeight:"100vh",paddingBottom:40}}>
      <Header title="Espace Gérant" onBack={onBack}/>
      <div style={{padding:"12px 14px 0"}}>
        <div style={{display:"flex",gap:5,marginBottom:16,flexWrap:"wrap"}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{background:tab===t.id?"rgba(201,168,76,0.18)":CARD,border:`1px solid ${tab===t.id?GOLD:BORDER}`,color:tab===t.id?GOLD:"#aaaaaa",borderRadius:10,padding:"8px 10px",fontSize:11,fontWeight:tab===t.id?600:400,cursor:"pointer",position:"relative"}}>
              {t.l}
              {t.id==="demandes"&&badge>0&&<span style={{position:"absolute",top:-5,right:-5,background:"#f87171",color:"#fff",borderRadius:"50%",width:15,height:15,fontSize:9,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{badge}</span>}
            </button>
          ))}
        </div>
        {tab==="demandes"&&<DemandesPanel store={store} fu={fu}/>}
        {tab==="adherents"&&<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <p style={{color:GOLD,fontSize:12,letterSpacing:1}}>ADHÉRENTS ({store.users.length})</p>
            {store.users.length>0&&(
              <button onClick={()=>{
                const date = new Date().toLocaleDateString("fr-FR");
                const lignes = store.users.map((u,i)=>
                  `${i+1}. ${u.prenom} | ${u.email} | ${u.points||0} pts`
                ).join("\n");
                const contenu = `ORIGIN CBD — Liste adhérents\nExportée le ${date}\n${"=".repeat(40)}\n\n${lignes}\n\n${"=".repeat(40)}\nTotal : ${store.users.length} adhérent(s)`;
                const blob = new Blob([contenu], {type:"text/plain;charset=utf-8"});
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href=url; a.download=`adherents_origincbd_${date.replace(/\//g,"-")}.txt`;
                a.click(); URL.revokeObjectURL(url);
              }} style={{background:`${GOLD}20`,border:`1px solid ${GOLD}60`,color:GOLD,borderRadius:10,padding:"7px 13px",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                ⬇️ Exporter PDF/TXT
              </button>
            )}
          </div>
          {store.users.length===0
            ?<div style={{textAlign:"center",padding:"40px 0"}}>
              <p style={{fontSize:32,marginBottom:8}}>👥</p>
              <p style={{color:"#909090",fontSize:13}}>Aucun adhérent inscrit</p>
            </div>
            :<>
              {/* Tableau récap */}
              <div style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${BORDER}`,borderRadius:12,overflow:"hidden",marginBottom:12}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1.5fr 0.8fr",padding:"8px 14px",borderBottom:`1px solid ${BORDER}`,background:"rgba(201,168,76,0.06)"}}>
                  {[["Prénom/Nom","#909090"],["Email","#909090"],["Points","#5aba60"]].map(([h,col])=>(
                    <p key={h} style={{color:col,fontSize:10,fontWeight:700,letterSpacing:.5}}>{h}</p>
                  ))}
                </div>
                {store.users.map((u,i)=>(
                  <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 1.5fr 0.8fr",padding:"10px 14px",borderBottom:i<store.users.length-1?"1px solid rgba(255,255,255,0.04)":"none",background:i%2===0?"transparent":"rgba(255,255,255,0.015)",alignItems:"center"}}>
                    <p style={{color:"#e8e4dc",fontWeight:600,fontSize:13}}>{u.prenom}</p>
                    <p style={{color:"#b0b0b0",fontSize:11,wordBreak:"break-all"}}>{u.email}</p>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                      <span style={{color:"#5aba60",fontWeight:700,fontSize:13}}>🏆 {u.points||0}</span>
                      <button onClick={()=>{store.users=store.users.filter(x=>x.email!==u.email);fu();}} style={{...BTN_RED,padding:"3px 7px",fontSize:11,cursor:"pointer"}}>×</button>
                    </div>
                  </div>
                ))}
              </div>
              <p style={{color:"#707070",fontSize:11,textAlign:"center"}}>Total : {store.users.length} adhérent(s) · {store.users.reduce((s,u)=>s+(u.points||0),0)} points cumulés</p>
            </>
          }
        </>}
        {tab==="commandes"&&<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <p style={{color:GOLD,fontSize:12,letterSpacing:1}}>COMMANDES ({store.commandes.length})</p>
            <div style={{display:"flex",gap:6}}>
              <span style={{background:"rgba(251,191,36,0.12)",color:"#fbbf24",border:"1px solid rgba(251,191,36,0.3)",borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:600}}>
                {store.commandes.filter(x=>x.statut==="nouvelle"||!x.statut).length} nouvelles
              </span>
            </div>
          </div>
          {store.commandes.length===0
            ?<div style={{textAlign:"center",padding:"40px 0"}}>
              <p style={{fontSize:32,marginBottom:8}}>📦</p>
              <p style={{color:"#909090",fontSize:13}}>Aucune commande reçue</p>
            </div>
            :store.commandes.map((cmd,i)=>(
              <Card key={i} style={{marginBottom:12,border:`1px solid ${cmd.statut==="traitee"?"rgba(74,180,80,0.25)":cmd.statut==="nouvelle"||!cmd.statut?"rgba(251,191,36,0.25)":"rgba(255,255,255,0.08)"}`}}>
                {/* Header */}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                  <div>
                    <p style={{color:"#e8e4dc",fontWeight:700,fontSize:15}}>{cmd.prenom}</p>
                    <p style={{color:"#b0b0b0",fontSize:12,marginTop:1}}>📞 {cmd.tel}</p>
                    <p style={{color:"#707070",fontSize:11,marginTop:1}}>{cmd.date}</p>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <p style={{color:GOLD,fontWeight:800,fontSize:18}}>{cmd.total}</p>
                    <span style={{
                      background:cmd.statut==="traitee"?"rgba(74,180,80,0.12)":"rgba(251,191,36,0.12)",
                      color:cmd.statut==="traitee"?"#5aba60":"#fbbf24",
                      border:`1px solid ${cmd.statut==="traitee"?"rgba(74,180,80,0.4)":"rgba(251,191,36,0.4)"}`,
                      borderRadius:20,padding:"2px 8px",fontSize:10,fontWeight:700,
                    }}>{cmd.statut==="traitee"?"✅ Traitée":"⏳ Nouvelle"}</span>
                  </div>
                </div>
                {/* Détail articles */}
                {cmd.detail&&(
                  <div style={{background:"rgba(255,255,255,0.04)",borderRadius:8,padding:"8px 10px",marginBottom:8}}>
                    {cmd.detail.split(" | ").map((ligne,j)=>(
                      <p key={j} style={{color:"#c0c0c0",fontSize:12,lineHeight:1.7}}>• {ligne}</p>
                    ))}
                  </div>
                )}
                {/* Note client */}
                {cmd.note&&(
                  <div style={{background:"rgba(201,168,76,0.06)",border:`1px solid ${BORDER}`,borderRadius:8,padding:"7px 10px",marginBottom:8}}>
                    <p style={{color:"#909090",fontSize:11}}>💬 <span style={{color:"#c8c8c8",fontStyle:"italic"}}>{cmd.note}</span></p>
                  </div>
                )}
                {/* Actions */}
                <div style={{display:"flex",gap:8}}>
                  {(cmd.statut==="nouvelle"||!cmd.statut)&&(
                    <button onClick={()=>{store.commandes[i].statut="traitee";fu();}}
                      style={{flex:1,background:"rgba(74,180,80,0.13)",border:"1px solid rgba(74,180,80,0.35)",color:"#5aba60",borderRadius:10,padding:"9px",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                      ✅ Marquer traitée
                    </button>
                  )}
                  {cmd.statut==="traitee"&&(
                    <button onClick={()=>{store.commandes[i].statut="nouvelle";fu();}}
                      style={{flex:1,background:"rgba(251,191,36,0.1)",border:"1px solid rgba(251,191,36,0.3)",color:"#fbbf24",borderRadius:10,padding:"9px",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                      ↩️ Rouvrir
                    </button>
                  )}
                  <button onClick={()=>{store.commandes.splice(i,1);fu();}}
                    style={{flex:1,background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.28)",color:"#f87171",borderRadius:10,padding:"9px",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                    🗑️ Supprimer
                  </button>
                </div>
              </Card>
            ))
          }
        </>}
        {tab==="avis"&&<>
          {/* Stats */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
            {[
              {label:"Total",val:store.avis.length,color:GOLD},
              {label:"En attente",val:store.avis.filter(a=>a.statut==="attente").length,color:"#fbbf24"},
              {label:"Publiés",val:store.avis.filter(a=>a.statut==="publie").length,color:"#5aba60"},
            ].map(s=>(
              <div key={s.label} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:10,padding:"10px",textAlign:"center"}}>
                <p style={{color:s.color,fontSize:20,fontWeight:700}}>{s.val}</p>
                <p style={{color:"#909090",fontSize:10,marginTop:2}}>{s.label}</p>
              </div>
            ))}
          </div>

          <AvisSousPanel store={store} fu={fu}/>
        </>}

        {tab==="stats"&&<StatsVentes store={store}/>}
        {tab==="codes"&&<>
          {/* Stats */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
            <div style={{background:"rgba(74,180,80,0.08)",border:"1px solid rgba(74,180,80,0.2)",borderRadius:10,padding:"10px 14px",textAlign:"center"}}>
              <p style={{color:"#5aba60",fontSize:22,fontWeight:700}}>{unusedCodes.length}</p>
              <p style={{color:"#4a9a50",fontSize:11,letterSpacing:1}}>DISPONIBLES</p>
            </div>
            <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:10,padding:"10px 14px",textAlign:"center"}}>
              <p style={{color:"#909090",fontSize:22,fontWeight:700}}>{usedCodes.length}</p>
              <p style={{color:"#707070",fontSize:11,letterSpacing:1}}>SCANNÉS</p>
            </div>
          </div>

          {/* Générateur */}
          <div style={{background:"rgba(201,168,76,0.06)",border:`1px solid ${BORDER}`,borderRadius:14,padding:"14px",marginBottom:14}}>
            <p style={{color:GOLD,fontSize:12,fontWeight:700,letterSpacing:1,marginBottom:12}}>🏷️ GÉNÉRER DES CODES</p>

            {/* Sélection grammage */}
            <p style={{color:"#b8b8b8",fontSize:11,letterSpacing:1,marginBottom:6}}>GRAMMAGE DU POCHON</p>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:12}}>
              {GRAMMAGES.map(g=>(
                <button key={g.q} onClick={()=>setGrammage(g.q)} style={{
                  background: grammage===g.q ? `${GOLD}25` : "rgba(255,255,255,0.04)",
                  border: `1.5px solid ${grammage===g.q ? GOLD : "rgba(255,255,255,0.08)"}`,
                  borderRadius:8, padding:"8px 4px", cursor:"pointer",
                  display:"flex", flexDirection:"column", alignItems:"center", gap:2,
                }}>
                  <span style={{color: grammage===g.q ? GOLD : "#d8d8d8", fontSize:12, fontWeight:700}}>{g.q}</span>
                  <span style={{
                    color: grammage===g.q ? "#5aba60" : "#707070",
                    fontSize:9, fontWeight:600,
                    background: grammage===g.q ? "rgba(74,180,80,0.15)" : "transparent",
                    borderRadius:10, padding:"1px 5px",
                  }}>+{g.pts} pt{g.pts>1?"s":""}</span>
                </button>
              ))}
            </div>

            {/* Quantité */}
            <p style={{color:"#b8b8b8",fontSize:11,letterSpacing:1,marginBottom:8}}>QUANTITÉ À GÉNÉRER</p>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
              <button onClick={()=>setQteGen(q=>Math.max(1,q-1))} style={{width:38,height:38,background:"rgba(255,255,255,0.06)",border:`1px solid ${BORDER}`,borderRadius:8,color:"#e8e4dc",fontSize:20,cursor:"pointer",flexShrink:0}}>−</button>
              <div style={{flex:1,background:"rgba(255,255,255,0.04)",border:`1px solid ${BORDER}`,borderRadius:8,height:38,display:"flex",alignItems:"center",justifyContent:"center"}}>
                <span style={{color:"#e8e4dc",fontSize:18,fontWeight:700}}>{qteGen}</span>
              </div>
              <button onClick={()=>setQteGen(q=>q+1)} style={{width:38,height:38,background:"rgba(255,255,255,0.06)",border:`1px solid ${BORDER}`,borderRadius:8,color:"#e8e4dc",fontSize:20,cursor:"pointer",flexShrink:0}}>+</button>
              {/* Raccourcis quantité */}
              {[5,10,20,50].map(n=>(
                <button key={n} onClick={()=>setQteGen(n)} style={{
                  background: qteGen===n ? `${GOLD}20` : "rgba(255,255,255,0.04)",
                  border:`1px solid ${qteGen===n ? GOLD : "rgba(255,255,255,0.08)"}`,
                  color: qteGen===n ? GOLD : "#b8b8b8",
                  borderRadius:7, padding:"5px 8px", fontSize:11, fontWeight:600, cursor:"pointer", flexShrink:0,
                }}>{n}</button>
              ))}
            </div>

            {/* Résumé + bouton générer */}
            <div style={{background:"rgba(0,0,0,0.2)",borderRadius:8,padding:"10px 12px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <p style={{color:"#d8d8d8",fontSize:13}}>
                  <span style={{color:GOLD,fontWeight:700}}>{qteGen} code{qteGen>1?"s":""}</span>
                  {" · "}<span style={{color:"#d8d8d8"}}>{grammage}</span>
                  {" · "}<span style={{color:"#5aba60",fontWeight:600}}>+{GRAMMAGES.find(x=>x.q===grammage)?.pts||1} pt{(GRAMMAGES.find(x=>x.q===grammage)?.pts||1)>1?"s":""} au scan</span>
                </p>
              </div>
            </div>
            <button onClick={genCodes} style={BTN_GOLD}>
              ✨ Générer {qteGen} code{qteGen>1?"s":""} {grammage}
            </button>
          </div>

          {/* Suppression codes inutilisés */}
          {unusedCodes.length>0&&(
            <button onClick={()=>{store.codes=store.codes.filter(c=>c.used);fu();}} style={{width:"100%",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.22)",color:"#f87171",borderRadius:10,padding:"10px",fontSize:12,cursor:"pointer",marginBottom:14}}>
              🗑️ Supprimer tous les codes non utilisés ({unusedCodes.length})
            </button>
          )}

          {/* Liste des codes groupés par grammage */}
          {store.codes.length===0
            ? <p style={{color:"#909090",textAlign:"center",padding:32}}>Aucun code généré</p>
            : Object.values(codesByGram).map(grp=>(
              <div key={grp.grammage} style={{marginBottom:14}}>
                {/* Entête groupe */}
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <div style={{background:"rgba(201,168,76,0.12)",border:`1px solid ${BORDER}`,borderRadius:20,padding:"4px 12px",display:"flex",alignItems:"center",gap:8}}>
                    <span style={{color:GOLD,fontSize:13,fontWeight:700}}>{grp.grammage}</span>
                    <span style={{background:"rgba(74,180,80,0.15)",border:"1px solid rgba(74,180,80,0.3)",borderRadius:20,padding:"1px 7px",color:"#5aba60",fontSize:10,fontWeight:700}}>+{grp.pts} pt{grp.pts>1?"s":""}</span>
                    <span style={{color:"#909090",fontSize:10}}>{grp.codes.filter(c=>!c.used).length} dispo · {grp.codes.filter(c=>c.used).length} scannés</span>
                  </div>
                  <div style={{flex:1,height:1,background:"rgba(255,255,255,0.06)"}}/>
                </div>
                {/* Grille de codes */}
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(80px,1fr))",gap:6}}>
                  {grp.codes.map((c)=>(
                    <div key={c.idx} style={{
                      background: c.used ? "rgba(20,20,20,0.6)" : "rgba(201,168,76,0.08)",
                      border:`1px solid ${c.used?"rgba(255,255,255,0.04)":BORDER}`,
                      borderRadius:10, padding:"8px 5px", textAlign:"center", position:"relative",
                    }}>
                      <p style={{color:c.used?"#5a5a5a":GOLD,fontSize:14,fontWeight:700,fontFamily:"monospace",letterSpacing:1}}>{c.code}</p>
                      <p style={{color:c.used?"#4a4a4a":"#909090",fontSize:9,marginTop:2}}>{c.used?"✓ Scanné":"Disponible"}</p>
                      {!c.used&&<button onClick={()=>{store.codes.splice(c.idx,1);fu();}} style={{position:"absolute",top:-4,right:-4,width:15,height:15,background:"rgba(239,68,68,0.8)",border:"none",borderRadius:"50%",color:"#fff",fontSize:9,cursor:"pointer",fontWeight:700,lineHeight:"15px"}}>×</button>}
                    </div>
                  ))}
                </div>
              </div>
            ))
          }
        </>}
      </div>
    </div>
  );
}

// ─── APP
function App(){
  const [phase,setPhase]=useState("age");
  const [user,setUser]=useState(null);
  const [tab,setTab]=useState("particulier");
  const [tick,setTick]=useState(0);
  function fu(){setTick(t=>t+1);}
  useEffect(()=>{
    const handler = ()=>fu();
    window.addEventListener("origincbd_update", handler);
    return ()=>window.removeEventListener("origincbd_update", handler);
  },[]);

  function handleScan(code, gram){
    const GRAM_PTS={
      "1g":1,"1,5g":1,"2g":2,"2,5g":2,"3g":3,"3,5g":3,
      "5g":5,"7g":7,"10g":10,"Pré-roulé":1,"E-cigarette":10
    };
    // Vérifier si le code existe dans STORE (généré par le gérant)
    const stored = STORE.codes.find(c=>c.code===code&&!c.used);
    // Vérifier si pas déjà utilisé
    const alreadyUsed = STORE.usedCodes && STORE.usedCodes.includes(code);
    if(alreadyUsed) return "❌ Code déjà scanné.";
    // Marquer comme utilisé
    if(stored) stored.used=true;
    if(!STORE.usedCodes) STORE.usedCodes=[];
    STORE.usedCodes.push(code);
    // Points selon grammage sélectionné par le client
    const pts = stored ? (stored.pts||GRAM_PTS[gram]||1) : (GRAM_PTS[gram]||1);
    const gramLabel = stored ? (stored.grammage||gram) : gram;
    if(user){
      user.points=(user.points||0)+pts;
      const u=STORE.users.find(x=>x.email===user.email);
      if(u)u.points=user.points;
      setUser({...user});
    }
    fu();
    const total = user?.points||pts;
    return `✅ +${pts} point${pts>1?"s":""} (${gramLabel}) ! Total : ${total} point${total>1?"s":""}`;
  }

  // Thème galaxy selon page
  const bgTheme = phase==="age"||phase==="login" ? "green"
    : phase==="manager" ? "white"
    : tab==="particulier" ? "green"
    : tab==="pro"         ? "violet"
    : tab==="fidelite"    ? "gold"
    : tab==="scanner"     ? "red"
    : "green";

  const globalStyle=`
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#020403;font-family:system-ui,sans-serif;color:#e8e4dc}
    input,select,button{font-family:inherit}
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.3);border-radius:3px}
  `;

  return(
    <div style={{minHeight:"100vh",background:"#020403",color:"#e8e4dc",fontFamily:"system-ui,sans-serif"}}>
      <style>{globalStyle}</style>
      <GalaxyBg theme={bgTheme}/>
      <div style={{position:"relative",zIndex:1}}>
        {phase==="age"&&<AgeGate onAccept={()=>setPhase("login")}/>}
        {phase==="login"&&<Welcome store={STORE} onUser={u=>{setUser(u);setPhase("app");}} onGuest={()=>setPhase("app")} onManager={()=>setPhase("manager")}/>}
        {phase==="manager"&&<Manager onBack={()=>setPhase("login")} store={STORE} tick={tick} setTick={setTick}/>}
        {phase==="app"&&<>
          {tab==="particulier"&&<CatalogueParticulier user={user}/>}
          {tab==="pro"&&<CataloguePro store={STORE} forceUpdate={fu}/>}
          {tab==="fidelite"&&<Fidelite user={user}/>}
          {tab==="scanner"&&<ScannerPage user={user} onScan={handleScan}/>}
          <BottomNav tab={tab} setTab={setTab} onQuit={()=>setPhase("login")}/>
        </>}
      </div>
    </div>
  );
}

  // Masquer le spinner une fois l'app montée
  const rootEl = document.getElementById('root');
  const loadingEl = document.getElementById('loading');
  ReactDOM.createRoot(rootEl).render(React.createElement(App));
  if (loadingEl) loadingEl.style.display = 'none';
  </script>
</body>
</html>
