const { useState, useRef, useEffect } = React;

function getPoints(q) {
  const s = String(q).toLowerCase();
  if (s.includes("e-cig") || s.includes("cigarette")) return 10;
  if (s.includes("roll") || s.includes("roulé")) return 1;
  if (s.includes("10g")) return 10;
  if (s.includes("7g")) return 7;
  if (s.includes("5g")) return 5;
  if (s.includes("3,5g") || s.includes("3.5g")) return 3;
  if (s.includes("3g")) return 3;
  if (s.includes("2,5g") || s.includes("2.5g")) return 2;
  if (s.includes("2g")) return 2;
  if (s.includes("1,5g") || s.includes("1.5g")) return 1;
  if (s.includes("1g")) return 1;
  if (s.includes("trim cbd")) return 10;
  if (s.includes("trim cbn")) return 10;
  return 1;
}

// ─── Starfield + Voie Lactée ──────────────────────────────────────────────────
function Stars() {
  const ref = useRef(null);
  useEffect(() => {
    const c = ref.current; if (!c) return;
    const ctx = c.getContext("2d");
    c.width = window.innerWidth; c.height = window.innerHeight;
    const stars = Array.from({ length: 320 }, () => ({
      x: Math.random() * c.width, y: Math.random() * c.height,
      r: Math.random() < 0.05 ? Math.random() * 2.5 + 1.5 : Math.random() * 1.1 + 0.15,
      a: Math.random(), s: Math.random() * 0.004 + 0.0008,
      bright: Math.random() < 0.08,
    }));
    let id;
    function draw() {
      ctx.fillStyle = "#06070a"; ctx.fillRect(0, 0, c.width, c.height);
      const angle = 28 * Math.PI / 180;
      const cos = Math.cos(angle), sin = Math.sin(angle);
      const cx = c.width * 0.5, cy = c.height * 0.48;
      const len = Math.max(c.width, c.height) * 1.5;
      for (let i = -3; i <= 3; i++) {
        const ox = -sin * i * 80, oy = cos * i * 80;
        const g = ctx.createLinearGradient(cx+ox-cos*len, cy+oy-sin*len, cx+ox+cos*len, cy+oy+sin*len);
        g.addColorStop(0,"rgba(100,120,200,0)"); g.addColorStop(0.5,"rgba(150,170,255,0.055)"); g.addColorStop(1,"rgba(100,120,200,0)");
        ctx.fillStyle=g; ctx.fillRect(0,0,c.width,c.height);
      }
      const gC = ctx.createLinearGradient(cx-cos*len,cy-sin*len,cx+cos*len,cy+sin*len);
      gC.addColorStop(0,"rgba(180,195,255,0)"); gC.addColorStop(0.45,"rgba(200,215,255,0.08)");
      gC.addColorStop(0.5,"rgba(225,235,255,0.22)"); gC.addColorStop(0.55,"rgba(200,215,255,0.08)"); gC.addColorStop(1,"rgba(180,195,255,0)");
      ctx.fillStyle=gC; ctx.fillRect(0,0,c.width,c.height);
      [[0.3,0.35,0.12,"rgba(120,160,255,0.04)"],[0.65,0.55,0.1,"rgba(180,140,255,0.035)"],[0.5,0.5,0.08,"rgba(200,220,255,0.07)"],[0.2,0.6,0.09,"rgba(100,200,180,0.03)"],[0.8,0.4,0.11,"rgba(200,180,120,0.03)"]].forEach(([rx,ry,rs,col])=>{
        const ng=ctx.createRadialGradient(c.width*rx,c.height*ry,0,c.width*rx,c.height*ry,c.width*rs);
        ng.addColorStop(0,col); ng.addColorStop(1,"rgba(0,0,0,0)");
        ctx.fillStyle=ng; ctx.fillRect(0,0,c.width,c.height);
      });
      stars.forEach(s=>{
        s.a+=s.s;
        const al=(Math.sin(s.a)+1)/2;
        if(s.bright){
          const hg=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*4);
          hg.addColorStop(0,`rgba(220,235,255,${al*0.5})`); hg.addColorStop(1,"rgba(0,0,0,0)");
          ctx.fillStyle=hg; ctx.beginPath(); ctx.arc(s.x,s.y,s.r*4,0,Math.PI*2); ctx.fill();
        }
        ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(215,228,255,${al*(s.bright?1:0.82)})`; ctx.fill();
      });
      id=requestAnimationFrame(draw);
    }
    draw();
    return ()=>cancelAnimationFrame(id);
  },[]);
  return <canvas ref={ref} style={{position:"fixed",inset:0,zIndex:0,width:"100vw",height:"100vh",pointerEvents:"none"}}/>;
}

function Welcome({onUser,onGuest,onManager,store}){

  function go(){
    if(!prenom.trim()||!email.trim()){setErr("Veuillez remplir tous les champs.");return;}
    if(!email.includes("@")){setErr("Email invalide.");return;}
    let u=store.users.find(x=>x.email===email);

  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px 20px"}}>

        {err&&<p style={{color:"#f87171",fontSize:13,marginBottom:12}}>{err}</p>}

  );
}

function PartenaireForm({store,forceUpdate}){
  const [show,setShow]=useState(false);
  const [ok,setOk]=useState(false);
  const [f,setF]=useState({prenom:"",siret:"",tva:"",email:"",formule:""});
  const [err,setErr]=useState("");
  const FORMULES_CHOIX=["F1 — Distributeur Automatique (30% commission)","F2 — Revente Directe (marge libre)","F3 — Distributeur + Revente (40% + marge)","F4 — Dépôt / Vente (50/50)","F5 — Achat de distributeur","Je ne sais pas encore"];

  function submit(){
    if(!f.prenom.trim()||!f.siret.trim()||!f.email.trim()||!f.formule){setErr("Veuillez remplir tous les champs obligatoires.");return;}
    if(!f.email.includes("@")){setErr("Email invalide.");return;}
    store.demandesPro.push({...f,type:"partenariat",date:new Date().toLocaleDateString("fr-FR"),statut:"attente"});
    forceUpdate(); setOk(true); setErr("");
  }

  if(!show) return(
    <div style={{background:"rgba(201,168,76,0.07)",border:`1px solid ${BORDER}`,borderRadius:14,padding:"18px",margin:"14px 0"}}>
      <p style={{color:"#e8e4dc",fontWeight:600,fontSize:15,marginBottom:8}}>🤝 Vous souhaitez devenir partenaire ?</p>
      <p style={{color:"#888",fontSize:13,lineHeight:1.6,marginBottom:14}}>Buraliste, épicerie, salon... Rejoignez le réseau Origin CBD. Remplissez votre demande et nous vous contactons sous 24h.</p>
      <button onClick={()=>setShow(true)} style={{background:"rgba(255,255,255,0.08)",border:`1px solid ${BORDER}`,color:"#e8e4dc",borderRadius:10,padding:"11px 20px",fontSize:13,fontWeight:500,cursor:"pointer"}}>
        📋 Faire une demande de partenariat →
      </button>
    </div>
  );

  return(
    <Card style={{margin:"14px 0"}}>
      {ok?(
        <div style={{textAlign:"center",padding:"20px 0"}}>
          <div style={{fontSize:46,marginBottom:12}}>✅</div>
          <p style={{color:"#5aba60",fontWeight:600,fontSize:16,marginBottom:8}}>Demande envoyée !</p>
          <p style={{color:"#888",fontSize:13,lineHeight:1.7}}>Nous avons bien reçu votre demande de partenariat.<br/>Nous vous contactons sous 24h.</p>
          <button onClick={()=>{setShow(false);setOk(false);setF({prenom:"",siret:"",tva:"",email:"",formule:""}); }} style={{...BTN_GOLD,marginTop:16}}>Fermer</button>
        </div>
      ):(
        <>
          <p style={{color:GOLD,fontWeight:600,fontSize:15,marginBottom:4}}>🤝 Demande de partenariat</p>
          <p style={{color:"#666",fontSize:13,marginBottom:16,lineHeight:1.6}}>Remplissez ce formulaire pour rejoindre le réseau Origin CBD. Nous vous contacterons sous 24h.</p>

          <p style={{color:"#777",fontSize:11,letterSpacing:1,marginBottom:5}}>PRÉNOM / NOM *</p>
          <input placeholder="Votre prénom et nom" value={f.prenom} onChange={e=>setF({...f,prenom:e.target.value})} style={{...IS,marginBottom:12}}/>

          <p style={{color:"#777",fontSize:11,letterSpacing:1,marginBottom:5}}>NUMÉRO SIRET *</p>
          <input placeholder="Ex : 12345678900012" value={f.siret} onChange={e=>setF({...f,siret:e.target.value.replace(/\D/,"").slice(0,14)})} style={{...IS,marginBottom:12}} maxLength={14}/>

          <p style={{color:"#777",fontSize:11,letterSpacing:1,marginBottom:5}}>N° TVA INTRACOMMUNAUTAIRE</p>
          <input placeholder="Ex : FR12345678900" value={f.tva} onChange={e=>setF({...f,tva:e.target.value.toUpperCase().slice(0,15)})} style={{...IS,marginBottom:12}}/>

          <p style={{color:"#777",fontSize:11,letterSpacing:1,marginBottom:5}}>EMAIL PROFESSIONNEL *</p>
          <input placeholder="votre@email.com" type="email" value={f.email} onChange={e=>setF({...f,email:e.target.value})} style={{...IS,marginBottom:12}}/>

          <button onClick={submit} style={BTN_GOLD}>Envoyer la demande →</button>
          <button onClick={()=>setShow(false)} style={{...BTN_GHOST,marginTop:8}}>Annuler</button>

// ─── FIDÉLITÉ ─────────────────────────────────────────────────────────────────
function Fidelite({user}){
  const pts=user?.points||0;
  const niv=NIVEAUX.find(n=>pts>=n.min&&pts<=n.max)||NIVEAUX[0];
  const next=NIVEAUX.find(n=>n.min>pts);
  const progPct=next?Math.min(100,((pts-niv.min)/(next.min-niv.min))*100):100;
  const nextPalier=PALIERS.find(p=>pts<p.pts);
  const lastPalier=[...PALIERS].reverse().find(p=>pts>=p.pts);

  return(
    <div style={{paddingBottom:80}}>
      <Header title="Fidélité" right={user&&<span style={{background:"rgba(201,168,76,0.12)",border:`1px solid ${BORDER}`,borderRadius:16,padding:"4px 12px",color:GOLD,fontSize:12}}>Origin CBD</span>}/>
      <div style={{padding:"14px 14px 0"}}>

        {/* Carte points */}
        <div style={{background:`linear-gradient(135deg,${niv.c}22,${niv.c}10)`,border:`1.5px solid ${niv.c}55`,borderRadius:18,padding:"20px",marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
            <div>
              <p style={{color:GOLD,fontSize:10,fontWeight:600,letterSpacing:2,marginBottom:5}}>PROGRAMME FIDÉLITÉ</p>
              <p style={{color:"#888",fontSize:13}}>{user?.prenom||"Invité"}</p>
            </div>
            <div style={{background:`${niv.c}25`,border:`1px solid ${niv.c}55`,borderRadius:20,padding:"5px 12px",display:"flex",alignItems:"center",gap:6}}>
              <span>{niv.icon}</span>
              <span style={{color:niv.c,fontSize:13,fontWeight:600}}>{niv.nom}</span>
            </div>
          </div>
          <p style={{color:niv.c,fontSize:54,fontWeight:700,lineHeight:1}}>{pts}</p>
          <p style={{color:"#777",fontSize:13,marginTop:4,marginBottom:14}}>points fidélité</p>
          <div style={{height:6,background:"rgba(255,255,255,0.08)",borderRadius:3,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${progPct}%`,background:niv.c,borderRadius:3,transition:"width .5s"}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
            <span style={{color:"#444",fontSize:11}}>{niv.nom}</span>
            <span style={{color:"#444",fontSize:11}}>{next?`${next.min} pts → ${next.icon} ${next.nom}`:"Niveau max 🎉"}</span>
          </div>
        </div>

        {/* Récompense actuelle */}
        {lastPalier&&(
          <div style={{background:"rgba(74,180,80,0.1)",border:"1px solid rgba(74,180,80,0.3)",borderRadius:12,padding:"14px 16px",marginBottom:14,display:"flex",alignItems:"center",gap:12}}>
            <span style={{fontSize:28}}>🎁</span>
            <div>
              <p style={{color:"#5aba60",fontWeight:600,fontSize:14}}>Récompense débloquée !</p>
              <p style={{color:"#aad4b0",fontSize:13}}>{lastPalier.reward}</p>
            </div>
          </div>
        )}

        {/* Prochain palier */}
        {nextPalier&&(
          <div style={{background:"rgba(201,168,76,0.07)",border:`1px solid ${BORDER}`,borderRadius:12,padding:"12px 16px",marginBottom:14}}>
            <p style={{color:GOLD,fontSize:12,marginBottom:4}}>Prochain palier dans <strong style={{color:GOLD}}>{nextPalier.pts-pts} points</strong></p>
            <p style={{color:"#888",fontSize:13}}>→ {nextPalier.reward}</p>
          </div>
        )}

        {/* Paliers */}
        <p style={{color:"#e8e4dc",fontWeight:600,fontSize:15,marginBottom:12}}>🎁 Paliers de récompenses</p>
        <div style={{marginBottom:18}}>
          {PALIERS.map(p=>{
            const done=pts>=p.pts;
            return(
              <div key={p.pts} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",borderRadius:10,background:done?"rgba(74,180,80,0.08)":"rgba(255,255,255,0.02)",border:`1px solid ${done?"rgba(74,180,80,0.25)":"rgba(255,255,255,0.05)"}`,marginBottom:6}}>
                <div style={{width:36,height:36,borderRadius:8,background:done?"rgba(74,180,80,0.2)":"rgba(255,255,255,0.06)",border:`1px solid ${done?"rgba(74,180,80,0.4)":"rgba(255,255,255,0.1)"}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <span style={{color:done?"#5aba60":"#555",fontWeight:700,fontSize:13}}>{p.pts}</span>
                </div>
                <div style={{flex:1}}>
                  <p style={{color:done?"#5aba60":"#888",fontSize:13,fontWeight:done?600:400}}>{p.reward}</p>
                </div>
                {done&&<span style={{color:"#5aba60",fontSize:16,fontWeight:700}}>✓</span>}
                {!done&&pts>0&&<div style={{width:60,height:4,background:"rgba(255,255,255,0.07)",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.min(100,(pts/p.pts)*100)}%`,background:GOLD,borderRadius:2}}/></div>}
              </div>
            );
          })}
        </div>

        {/* Niveaux */}
        <p style={{color:"#e8e4dc",fontWeight:600,fontSize:15,marginBottom:12}}>🏆 Niveaux fidélité</p>
        {NIVEAUX.map(n=>(
          <div key={n.nom} style={{display:"flex",alignItems:"center",gap:12,background:pts>=n.min?`${n.c}12`:CARD,border:`1px solid ${pts>=n.min?n.c+"44":BORDER}`,borderRadius:12,padding:"12px 15px",marginBottom:8,opacity:pts>=n.min?1:0.5}}>
            <span style={{fontSize:22}}>{n.icon}</span>
            <div style={{flex:1}}>
              <p style={{color:pts>=n.min?n.c:"#777",fontWeight:600,fontSize:14}}>{n.nom}</p>
              <p style={{color:"#444",fontSize:11}}>{n.min===0?"Dès l'inscription":`${n.min} pts`}{n.max<Infinity?` — ${n.max} pts`:"+"}</p>
            </div>
            {pts>=n.min&&<span style={{color:n.c,fontWeight:700,fontSize:14}}>✓</span>}
          </div>
        ))}

        {/* Barème de points */}
        <p style={{color:"#e8e4dc",fontWeight:600,fontSize:15,margin:"18px 0 12px"}}>📊 Barème de points</p>
        <Card>
          {[
            ["1g acheté","1 pt"],["2g ou 2,5g","2 pts"],["3g ou 3,5g","3 pts"],
            ["5g","5 pts"],["7g","7 pts"],["10g","10 pts"],
            ["1 pré-roll","1 pt"],["1 e-cigarette","10 pts"],
          ].map(([k,v])=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
              <span style={{color:"#999",fontSize:13}}>{k}</span>
              <span style={{color:"#5aba60",fontWeight:600,fontSize:13}}>{v}</span>
            </div>
          ))}
          <p style={{color:"#555",fontSize:11,marginTop:10,fontStyle:"italic"}}>Les points sont crédités après validation de votre commande ou scan du code pochon.</p>
        </Card>
      </div>
    </div>
  );
}

// ─── SCANNER PAGE ─────────────────────────────────────────────────────────────
function ScannerPage({user,onScan}){
  const [val,setVal]=useState(""); const [msg,setMsg]=useState("");
  function go(){if(!val.trim())return;const r=onScan(val);setMsg(r);setVal("");setTimeout(()=>setMsg(""),3500);}
  return(
    <div style={{paddingBottom:80}}>
      <Header title="Scanner"/>
      <div style={{padding:"40px 24px",display:"flex",flexDirection:"column",alignItems:"center",textAlign:"center"}}>
        <div style={{fontSize:76,marginBottom:18}}>📱</div>
        <h2 style={{fontFamily:"'Cormorant Garamond',serif",color:GOLD,fontSize:28,marginBottom:8}}>Scanner mon code</h2>
        <p style={{color:"#666",fontSize:14,lineHeight:1.7,marginBottom:30,maxWidth:300}}>
          Chaque pochon Origin CBD a un code unique 5 chiffres.<br/>
          Entrez-le pour gagner des <span style={{color:GOLD,fontWeight:600}}>points fidélité</span>.
        </p>
        <div style={{width:"100%",maxWidth:320}}>
          <input placeholder="Code 5 chiffres" value={val} onChange={e=>setVal(e.target.value.replace(/\D/,"").slice(0,5))} onKeyDown={e=>e.key==="Enter"&&go()} style={{...IS,textAlign:"center",letterSpacing:10,fontSize:28,marginBottom:14}} maxLength={5}/>
          {msg&&<p style={{color:msg.startsWith("✅")?"#5aba60":"#f87171",fontSize:14,marginBottom:14}}>{msg}</p>}
          <button onClick={go} style={BTN_GOLD}>Valider le code →</button>
          <p style={{color:"#444",fontSize:12,marginTop:18,lineHeight:1.6}}>
            {user?`${user.prenom} · ${user.points||0} points fidélité`:"Connectez-vous pour cumuler des points"}
          </p>
        </div>
      </div>
    </div>
  );
}

            {store.avis.length>0&&<button onClick={()=>{store.avis=[];fu();}} style={{...BTN_RED,cursor:"pointer"}}>Tout supprimer</button>}
          </div>
          {store.avis.length===0?<p style={{color:"#444",textAlign:"center",padding:40}}>Aucun avis</p>
          :store.avis.map((a,i)=>(
            <Card key={i} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div style={{flex:1}}><p style={{color:"#e8e4dc",fontWeight:600}}>{a.auteur} — {"⭐".repeat(a.note)}</p><p style={{color:"#888",fontSize:12,marginTop:3,lineHeight:1.5}}>{a.texte}</p></div>
                <button onClick={()=>{store.avis.splice(i,1);fu();}} style={{...BTN_RED,cursor:"pointer",marginLeft:10}}>×</button>
              </div>
            </Card>
          ))}
        </>}

        {tab==="codes"&&<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <p style={{color:GOLD,fontSize:12,letterSpacing:1}}>CODES PRODUITS</p>
            <div style={{display:"flex",gap:8}}>
              <span style={{color:"#5aba60",fontSize:11}}>{unusedCodes.length} disponibles</span>
              <span style={{color:"#444",fontSize:11}}>·</span>
              <span style={{color:"#555",fontSize:11}}>{usedCodes.length} scannés</span>
            </div>
          </div>
          <p style={{color:"#555",fontSize:12,marginBottom:12}}>Codes 5 chiffres à coller sur les pochons. Scanner = +1 point fidélité.</p>
          <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
            {[5,10,20,50].map(n=><button key={n} onClick={()=>genCodes(n)} style={{...BTN_GOLD,width:"auto",padding:"9px 15px",fontSize:12,cursor:"pointer"}}>+{n}</button>)}
          </div>
          {unusedCodes.length>0&&(
            <button onClick={()=>{store.codes=store.codes.filter(c=>c.used);fu();}} style={{width:"100%",background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.28)",color:"#f87171",borderRadius:10,padding:"10px",fontSize:12,cursor:"pointer",marginBottom:12}}>
              🗑️ Supprimer tous les codes non utilisés ({unusedCodes.length})
            </button>
          )}
          {store.codes.length===0?<p style={{color:"#444",textAlign:"center",padding:24}}>Aucun code généré</p>:<>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(82px,1fr))",gap:7,marginBottom:12}}>
              {store.codes.map((c,i)=>(
                <div key={i} style={{background:c.used?"rgba(30,30,30,0.5)":"rgba(201,168,76,0.1)",border:`1px solid ${c.used?"#1c1c1c":BORDER}`,borderRadius:10,padding:"9px 5px",textAlign:"center",position:"relative"}}>
                  <p style={{color:c.used?"#333":GOLD,fontSize:15,fontWeight:700,fontFamily:"monospace",letterSpacing:2}}>{c.code}</p>
                  <p style={{color:c.used?"#2a2a2a":"#555",fontSize:9,marginTop:2}}>{c.used?"✓ Scanné":"Disponible"}</p>
                  {!c.used&&<button onClick={()=>{store.codes.splice(i,1);fu();}} style={{position:"absolute",top:-4,right:-4,width:15,height:15,background:"rgba(239,68,68,0.75)",border:"none",borderRadius:"50%",color:"#fff",fontSize:9,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontWeight:700}}>×</button>}
                </div>
              ))}
            </div>
            {unusedCodes.length>0&&<button onClick={()=>{const w=window.open("","_blank");w.document.write(`<html><head><title>Codes ORIGIN CBD</title><style>body{font-family:monospace;padding:20px}h2{font-size:14px;margin-bottom:14px}div{display:inline-block;border:2px solid #222;margin:5px;padding:10px;font-size:20px;font-weight:bold;letter-spacing:3px;width:86px;text-align:center;border-radius:5px}</style></head><body><h2>ORIGIN CBD — Codes disponibles (${unusedCodes.length})</h2>${unusedCodes.map(c=>`<div>${c.code}</div>`).join("")}</body></html>`);w.print();}} style={{...BTN_GOLD,maxWidth:260,fontSize:12,cursor:"pointer"}}>🖨️ Imprimer ({unusedCodes.length} codes)</button>}
          </>}
        </>}
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App(){
  const [phase,setPhase]=useState("age");
  const [user,setUser]=useState(null);
  const [tab,setTab]=useState("particulier");
  const [tick,setTick]=useState(0);
  function fu(){setTick(t=>t+1);}

  function handleScan(code){
    const f=STORE.codes.find(c=>c.code===code&&!c.used);
    if(!f)return"❌ Code invalide ou déjà scanné.";
    f.used=true;
    if(user){
      user.points=(user.points||0)+1;
      const u=STORE.users.find(x=>x.email===user.email);
      if(u)u.points=user.points;
      setUser({...user});
    }
    fu();
    return`✅ +1 point ! Total : ${user?.points||1} point${(user?.points||1)>1?"s":""}`;
  }

  if(phase==="age") return <><Stars/><div style={{position:"relative",zIndex:1}}><AgeGate onAccept={()=>setPhase("login")}/></div></>;
  if(phase==="login") return <><Stars/><div style={{position:"relative",zIndex:1}}><Welcome store={STORE} onUser={u=>{setUser(u);setPhase("app");}} onGuest={()=>setPhase("app")} onManager={()=>setPhase("manager")}/></div></>;
  if(phase==="manager") return <><Stars/><div style={{position:"relative",zIndex:1}}><Manager onBack={()=>setPhase("login")} store={STORE} tick={tick} setTick={setTick}/></div></>;

  return(
    <div style={{minHeight:"100vh"}}>
      <Stars/>
      <div style={{position:"relative",zIndex:1}}>
        {tab==="particulier"&&<CatalogueParticulier user={user}/>}
        {tab==="pro"&&<CataloguePro store={STORE} forceUpdate={fu}/>}
        {tab==="fidelite"&&<Fidelite user={user}/>}
        {tab==="scanner"&&<ScannerPage user={user} onScan={handleScan}/>}
        <BottomNav tab={tab} setTab={setTab} onQuit={()=>setPhase("login")}/>
      </div>
      <style>{css}</style>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

  </script>
</body>
</html>
